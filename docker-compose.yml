services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: job-client
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - jobspark_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: job-server
    ports:
      - "8080:8080"
    env_file:
      - ./server/.env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - jobspark_network

  mongodb:
    image: mongo:7
    container_name: job-mongodb
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - jobspark_network

  redis:
    image: redis:7-alpine
    container_name: job-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobspark_network

  rabbitmq:
    image: rabbitmq:management
    container_name: job-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - jobspark_network

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:

networks:
  jobspark_network:
    driver: bridge